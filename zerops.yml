zerops:
  - setup: app
    build:
      base: php@8.3
      os: alpine
      buildCommands:
        - composer install --optimize-autoloader --no-dev
      deployFiles: ./
      cache:
        - vendor
        - composer.lock
    deploy:
      readinessCheck:
        httpGet:
          port: 80
          path: /
    run:
      base: php-apache@8.3
      os: alpine
      documentRoot: www/
      initCommands:
        - zsc execOnce $appVersionId -- php /var/www/bin/console migrations:continue
        - chown -R zerops:zerops /var/www/temp/
      healthCheck:
        httpGet:
          port: 80
          path: /
      envVariables:
        DATABASE_DSN: 'pgsql:host=${db_hostname};port=${db_port};dbname=${db_dbName}'
        DATABASE_USER: '${db_user}'
        DATABASE_PASSWORD: '${db_password}'
        REDIS_URI: 'tcp://${redis_hostname}:${redis_port}'
